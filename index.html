<!DOCTYPE html>
<html lang="zh-Hant" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Threads - obsess</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Font Awesome 6.5.1 (包含官方 Threads 品牌圖示) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Google Fonts: Noto Sans TC -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Noto Sans TC', 'sans-serif'],
          },
          colors: {
            threadsDark: '#101010',
            threadsCard: '#181818',
            threadsBorder: '#2d2d2d',
            threadsGray: '#616161',
            threadsLightGray: '#999999',
            threadsText: '#f3f5f7',
          }
        }
      }
    }
  </script>

  <style>
    /* 隱藏捲軸，保持MV畫面乾淨 */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    /* 拍攝模式下的游標隱藏 */
    .hide-cursor {
      cursor: none !important;
    }
    
    /* 留言滑入動畫 */
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .comment-animate {
      animation: slideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* 脈衝綠幕光暈效果，供特效對位參考 */
    .green-glow {
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.1);
    }
  </style>
</head>
<body class="bg-threadsDark text-threadsText font-sans min-h-screen selection:bg-neutral-800 antialiased overflow-y-scroll no-scrollbar">

  <!-- 頂部導航欄 (在拍攝模式時可隱藏) -->
  <header id="appHeader" class="sticky top-0 z-40 bg-threadsDark/95 backdrop-blur-md border-b border-threadsBorder/40 transition-all duration-300">
    <div class="max-w-[620px] mx-auto px-4 h-16 flex items-center justify-between">
      <!-- Threads 官方 Logo 採用 Font Awesome Brands Icon -->
      <div class="w-8 h-8 flex items-center justify-center text-threadsText cursor-pointer" title="Threads">
        <i class="fa-brands fa-threads text-[28px]"></i>
      </div>

      <!-- 導航選單 (中央) -->
      <nav class="flex items-center space-x-12 text-threadsLightGray">
        <button class="hover:text-threadsText text-threadsText transition-colors"><i class="fa-solid fa-house text-[21px]"></i></button>
        <!-- 點擊此按鈕將跳轉至同目錄下的 cam.html -->
        <button onclick="window.location.href='cam.html'" class="hover:text-threadsText transition-colors" title="搜尋 / 相機"><i class="fa-solid fa-magnifying-glass text-[21px]"></i></button>
        <!-- 點擊此按鈕將跳轉至同目錄下的 live.html -->
        <button onclick="window.location.href='live.html'" class="hover:text-threadsText transition-colors" title="發佈新貼文"><i class="fa-regular fa-pen-to-square text-[21px]"></i></button>
        <button class="hover:text-threadsText transition-colors"><i class="fa-regular fa-heart text-[21px]"></i></button>
	<button onclick="window.location.href='title.html'" class="hover:text-threadsText transition-colors" title="標題產生器"><i class="fa-regular fa-pen-to-square text-[21px]"></i></button>
        <button class="hover:text-threadsText transition-colors"><i class="fa-regular fa-user text-[21px]"></i></button>
      </nav>

      <!-- 右側菜單 -->
      <div class="flex items-center space-x-4">
        <button onclick="toggleControlPanel()" class="w-8 h-8 rounded-full bg-neutral-800/80 hover:bg-neutral-700 flex items-center justify-center text-threadsLightGray hover:text-threadsText transition-all" title="導演控制台">
          <i class="fa-solid fa-sliders text-[16px]"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- 主要內容區 (Threads Feed) -->
  <main class="max-w-[620px] mx-auto px-4 pb-24 pt-4 transition-all duration-300">
    
    <!-- 頂部動態切換 tab -->
    <div id="feedTabs" class="flex justify-around border-b border-threadsBorder pb-3 text-sm font-bold text-threadsLightGray mb-2">
      <button class="text-threadsText border-b-2 border-threadsText pb-3 -mb-3.5 px-6">為您推薦</button>
      <button class="hover:text-threadsText transition-colors pb-3 px-6">已追蹤</button>
    </div>

    <!-- 貼文串流容器 -->
    <div id="threadsFeed" class="divide-y divide-threadsBorder/60">
      <!-- 貼文將透過 JS 動態注入 -->
    </div>

  </main>

  <!-- ==================== 導演控制面板 (DIRECTOR'S CONTROL PANEL) ==================== -->
  <div id="directorPanel" class="fixed bottom-4 right-4 md:bottom-6 md:right-6 w-[calc(100%-2rem)] md:w-[360px] bg-black/90 border border-neutral-700 rounded-2xl shadow-[0_10px_30px_rgba(0,0,0,0.5)] backdrop-blur-xl z-50 text-white text-xs overflow-hidden transition-all duration-300 transform scale-100 opacity-100">
    <!-- 控制面板頭部 -->
    <div class="bg-neutral-900 px-4 py-3 border-b border-neutral-800 flex items-center justify-between">
      <div class="flex items-center space-x-2">
        <span class="inline-block w-2.5 h-2.5 rounded-full bg-red-600 animate-pulse"></span>
        <span class="font-extrabold tracking-wider uppercase text-[10px] text-neutral-300">MV 現場導演控制台</span>
      </div>
      <div class="flex items-center space-x-2">
        <button onclick="minimizePanel()" class="hover:bg-neutral-800 text-neutral-400 hover:text-white p-1 rounded transition-colors">
          <i class="fa-solid fa-minus text-[14px]" id="minIcon"></i>
        </button>
        <button onclick="toggleControlPanel()" class="hover:bg-neutral-800 text-neutral-400 hover:text-red-500 p-1 rounded transition-colors">
          <i class="fa-solid fa-xmark text-[14px]"></i>
        </button>
      </div>
    </div>

    <!-- 控制面板內容 (可摺疊) -->
    <div id="panelContent" class="p-4 space-y-4 max-h-[500px] overflow-y-auto no-scrollbar">
      
      <!-- 快捷操作 -->
      <div>
        <h4 class="text-neutral-400 font-bold mb-2 uppercase tracking-wide">🎬 拍攝模式 (最重要)</h4>
        <div class="grid grid-cols-2 gap-2">
          <button onclick="toggleFilmingMode()" id="filmingBtn" class="flex items-center justify-center space-x-1.5 py-2 px-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg transition-colors shadow">
            <i class="fa-solid fa-video text-[13px]"></i>
            <span>進入拍攝模式</span>
          </button>
          <button onclick="scrollToObsessPost()" class="flex items-center justify-center space-x-1.5 py-2 px-3 bg-neutral-800 hover:bg-neutral-700 text-neutral-200 font-bold rounded-lg transition-colors">
            <i class="fa-solid fa-crosshairs text-[13px]"></i>
            <span>聚焦主演貼文</span>
          </button>
        </div>
        <p class="text-[10px] text-neutral-400 mt-1.5 text-center">💡 按 <kbd class="px-1 bg-neutral-800 border border-neutral-700 rounded text-neutral-200">F</kbd> 開啟拍攝，按 <kbd class="px-1 bg-neutral-800 border border-neutral-700 rounded text-neutral-200">H</kbd> 隱藏此面板</p>
        <p class="text-[9px] text-sky-400 mt-1 text-center">📱 手機端捷徑：點擊畫面中 <b class="underline">obsess</b> 貼文的大頭貼可開關此面板</p>
      </div>

      <!-- 本機影片播放區塊 -->
      <div class="border-t border-neutral-800 pt-3">
        <h4 class="text-neutral-400 font-bold mb-2 uppercase tracking-wide">📹 綠幕影片匯入</h4>
        <div class="space-y-2">
          <div class="flex items-center justify-between">
            <span class="text-neutral-300">匯入本機影片 (支援循環播放)</span>
            <button id="clearVideoBtn" onclick="clearChromaVideo()" class="px-2 py-1 bg-red-950 hover:bg-red-900 border border-red-800 text-red-300 rounded font-bold text-[9px] hidden">清除影片</button>
          </div>
          <label class="flex flex-col items-center justify-center w-full h-16 border border-dashed border-neutral-700 rounded-xl cursor-pointer hover:bg-neutral-900/50 transition-colors">
            <div class="flex flex-col items-center justify-center pt-1 text-center">
              <i class="fa-solid fa-film text-neutral-400 text-[18px]"></i>
              <p class="text-[10px] text-neutral-400 mt-1">選擇本機 MP4 / 影片檔案</p>
            </div>
            <input type="file" id="chromaVideoInput" accept="video/*" onchange="handleChromaVideo(this)" class="hidden">
          </label>
          <p id="videoStatus" class="text-[10px] text-neutral-500 text-center italic">目前使用純色背景</p>
        </div>
      </div>

      <!-- 後製去背色彩設定 -->
      <div class="border-t border-neutral-800 pt-3">
        <h4 class="text-neutral-400 font-bold mb-2 uppercase tracking-wide">🟢 後製去背色彩</h4>
        <div class="space-y-3">
          <div class="flex items-center justify-between">
            <span class="text-neutral-300">底色選擇</span>
            <div class="flex space-x-1">
              <button onclick="setChromaColor('#00FF00')" class="w-5 h-5 bg-[#00FF00] rounded-full border-2 border-white ring-1 ring-black"></button>
              <button onclick="setChromaColor('#00b140')" class="w-5 h-5 bg-[#00b140] rounded-full border border-neutral-600"></button>
              <button onclick="setChromaColor('#002fff')" class="w-5 h-5 bg-[#002fff] rounded-full border border-neutral-600"></button>
              <button onclick="setChromaColor('#00ffff')" class="w-5 h-5 bg-[#00ffff] rounded-full border border-neutral-600"></button>
            </div>
          </div>
          <div>
            <div class="flex justify-between text-[10px] mb-1">
              <span class="text-neutral-400">自定義 HEX 碼</span>
              <span id="chromaHexText" class="text-green-400 font-mono">#00FF00</span>
            </div>
            <input type="color" id="chromaColorPicker" oninput="updateChromaFromPicker(this.value)" value="#00FF00" class="w-full h-8 bg-transparent cursor-pointer rounded">
          </div>
          
          <!-- 後製追蹤點控制開關 -->
          <div class="flex items-center justify-between border-t border-neutral-800/60 pt-2.5">
            <div>
              <span class="text-neutral-300 font-medium block">後製追蹤點 (Tracking Marks)</span>
              <span class="text-[9px] text-neutral-500">在貼文綠幕上生成對角與中心十字標</span>
            </div>
            <button id="trackingToggleBtn" onclick="toggleTrackingMarks()" class="px-3 py-1.5 bg-neutral-800 hover:bg-neutral-700 text-neutral-300 rounded font-bold transition-all border border-neutral-700 min-w-[70px]">
              已關閉
            </button>
          </div>
        </div>
      </div>

      <!-- 綠幕比例調整 -->
      <div class="border-t border-neutral-800 pt-3">
        <h4 class="text-neutral-400 font-bold mb-2 uppercase tracking-wide">📐 合成框縱橫比</h4>
        <div class="grid grid-cols-3 gap-1">
          <button onclick="setChromaAspect('aspect-square')" class="aspect-btn bg-neutral-800 hover:bg-neutral-700 p-1.5 rounded text-neutral-300 font-mono active">1:1 Square</button>
          <button onclick="setChromaAspect('aspect-[4/5]')" class="aspect-btn bg-neutral-800 hover:bg-neutral-700 p-1.5 rounded text-neutral-300 font-mono">4:5 Portrait</button>
          <button onclick="setChromaAspect('aspect-video')" class="aspect-btn bg-neutral-800 hover:bg-neutral-700 p-1.5 rounded text-neutral-300 font-mono">16:9 Video</button>
        </div>
      </div>

      <!-- 酸民留言控制系統 -->
      <div class="border-t border-neutral-800 pt-3">
        <h4 class="text-neutral-400 font-bold mb-2 uppercase tracking-wide">🤬 酸民留言動態控制</h4>
        <div class="space-y-3">
          <div class="flex items-center justify-between">
            <span class="text-neutral-300">自動生成狀態</span>
            <span id="commentStatus" class="px-1.5 py-0.5 bg-green-950 text-green-400 rounded-full text-[10px] font-bold">動態跳動中</span>
          </div>
          
          <div class="flex space-x-1">
            <button onclick="toggleAutoComments()" id="playPauseCommentBtn" class="flex-1 py-1.5 bg-neutral-800 hover:bg-neutral-700 text-neutral-200 rounded flex items-center justify-center space-x-1">
              <i class="fa-solid fa-pause text-[13px]"></i>
              <span id="playPauseText">暫停生成</span>
            </button>
            <button onclick="triggerSingleComment()" class="py-1.5 px-3 bg-red-950/80 hover:bg-red-900 border border-red-700 text-red-200 rounded flex items-center justify-center" title="立刻生一個酸民">
              <i class="fa-solid fa-triangle-exclamation text-[13px]"></i>
            </button>
            <button onclick="triggerHateBomb()" class="py-1.5 px-2 bg-yellow-950 hover:bg-yellow-900 border border-yellow-700 text-yellow-200 rounded text-[10px] flex items-center justify-center font-bold" title="連續灌爆留言">
              💣 留言灌爆
            </button>
          </div>

          <!-- 留言速度 -->
          <div>
            <div class="flex justify-between text-neutral-400 mb-1">
              <span>留言跳動速度 (秒/則)</span>
              <span id="speedVal" class="text-white font-mono">1.5s</span>
            </div>
            <input type="range" id="commentSpeedRange" min="0.5" max="5" step="0.5" value="1.5" oninput="changeCommentSpeed(this.value)" class="w-full accent-red-600 bg-neutral-800 h-1.5 rounded-lg appearance-none cursor-pointer">
          </div>
        </div>
      </div>

      <!-- 仿真數據修改 -->
      <div class="border-t border-neutral-800 pt-3">
        <h4 class="text-neutral-400 font-bold mb-2 uppercase tracking-wide">📈 貼文數據初始化</h4>
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="text-[10px] text-neutral-500">初始按讚數</label>
            <input type="number" id="initLikes" value="842" onchange="resetCounts()" class="w-full bg-neutral-800 text-white rounded p-1.5 border border-neutral-700">
          </div>
          <div>
            <label class="text-[10px] text-neutral-500">初始轉發數</label>
            <input type="number" id="initReposts" value="184" onchange="resetCounts()" class="w-full bg-neutral-800 text-white rounded p-1.5 border border-neutral-700">
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- 浮動開啟控制台小按鈕 (在完全隱藏控制台時可以召喚出來) -->
  <button id="floatingControlBtn" onclick="toggleControlPanel()" class="fixed bottom-6 left-6 w-10 h-10 rounded-full bg-neutral-900/90 border border-neutral-700 flex items-center justify-center text-white shadow-lg hover:bg-neutral-800 z-50 transition-all transform hover:scale-105 hidden">
    <i class="fa-solid fa-sliders"></i>
  </button>

  <!-- 螢幕中央「拍攝模式」提示 Overlay -->
  <div id="filmingOverlay" class="fixed inset-0 bg-black/80 z-[100] flex flex-col items-center justify-center pointer-events-none opacity-0 transition-opacity duration-300">
    <div class="text-center">
      <i class="fa-solid fa-video text-[72px] text-red-600 animate-pulse"></i>
      <h2 class="text-2xl font-black mt-2 tracking-widest text-white">MV 拍攝模式已啟動</h2>
      <p class="text-sm text-neutral-400 mt-1">控制台已完全隱藏。按下 <kbd class="px-1.5 py-0.5 bg-neutral-800 border border-neutral-700 rounded text-neutral-200">F</kbd> 或 <kbd class="px-1.5 py-0.5 bg-neutral-800 border border-neutral-700 rounded text-neutral-200">ESC</kbd> 退出</p>
    </div>
  </div>

            toggleFilmingMode();

    // --- 處理使用者自行輸入的留言提交邏輯 ---
    function submitUserComment(event) {
      event.preventDefault();
      const inputEl = document.getElementById('userCommentInput');
      if (!inputEl) return;
      
      const text = inputEl.value.trim();
      if (!text) return;

      const container = document.getElementById('hatersContainer');
      if (!container) return;

      // 隨機獲取性別、頭像 ID 與帳號，實現隨機分派身份效果
      const gender = Math.random() > 0.5 ? 'men' : 'women';
      const randomId = Math.floor(Math.random() * 80);
      const randomAvatar = `https://randomuser.me/api/portraits/${gender}/${randomId}.jpg`;
      const randomUser = userNames[Math.floor(Math.random() * userNames.length)];

      const commentDiv = document.createElement('div');
      commentDiv.className = 'flex space-x-2 text-xs py-2 px-3 bg-threadsCard/30 hover:bg-threadsCard/50 border border-threadsBorder/30 rounded-lg comment-animate';
      
      commentDiv.innerHTML = `
        <div class="w-6 h-6 rounded-full overflow-hidden bg-neutral-800 flex-shrink-0">
          <img src="${randomAvatar}" alt="user" class="w-full h-full object-cover">
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center justify-between">
            <span class="font-bold text-threadsText hover:underline cursor-pointer text-[11px]">${randomUser}</span>
            <span class="text-[9px] text-threadsLightGray">剛剛</span>
          </div>
          <p class="text-threadsText/95 mt-0.5 leading-relaxed text-[11px]">${text}</p>
        </div>
      `;

      // 置頂插入到最前方
      container.insertBefore(commentDiv, container.firstChild);
      
      // 自動滾動到留言容器頂端，方便立即檢視剛送出的回覆
      container.scrollTop = 0;

      // 清空輸入框
      inputEl.value = '';

      // 隨機為輸入框左側大頭貼更新下一張預覽，增加真實感
      const nextGender = Math.random() > 0.5 ? 'men' : 'women';
      const nextId = Math.floor(Math.random() * 80);
      const previewAvatar = document.getElementById('userPreviewAvatar');
      if (previewAvatar) {
        previewAvatar.src = `https://randomuser.me/api/portraits/${nextGender}/${nextId}.jpg`;
      }

      // 動態增加主貼文的回覆數據，同步反映當下熱度
      dynamicReplies++;
      updateCounters();
    }

    // --- 自動隨機生成酸民留言 ---
    function startAutoComments() {
      if (commentsTimer) clearInterval(commentsTimer);
      commentsTimer = setInterval(() => {
        if (autoCommentsEnabled) {
          triggerSingleComment();
        }
      }, commentSpeed * 1000);
    }

    // --- 單獨生成一則留言並注入 ---
    function triggerSingleComment() {
      const container = document.getElementById('hatersContainer');
      if (!container) return;

      // 隨機選一個酸民名字和頭像API
      const randomUser = userNames[Math.floor(Math.random() * userNames.length)];
      const randomId = Math.floor(Math.random() * 80);
      const randomAvatar = `https://randomuser.me/api/portraits/men/${randomId}.jpg`; // 隨機真實頭像

      // 隨機選一則罵人的話
      const randomHate = haterComments[Math.floor(Math.random() * haterComments.length)];
      
      const commentDiv = document.createElement('div');
      commentDiv.className = 'flex space-x-2 text-xs py-2 px-3 bg-red-950/10 hover:bg-red-950/20 border border-red-900/10 rounded-lg comment-animate';
      
      commentDiv.innerHTML = `
        <div class="w-6 h-6 rounded-full overflow-hidden bg-neutral-800 flex-shrink-0">
          <img src="${randomAvatar}" alt="hater" class="w-full h-full object-cover">

        <div class="flex-1 min-w-0">
          <div class="flex items-center justify-between">
            <span class="font-bold text-red-400 hover:underline cursor-pointer text-[11px]">${randomUser}</span>
            <span class="text-[9px] text-threadsLightGray">1秒前</span>
          </div>
          <p class="text-threadsText/90 mt-0.5 leading-relaxed text-[11px]">${randomHate}</p>
        </div>
      `;

      // 插入到最前面
      container.insertBefore(commentDiv, container.firstChild);

      // 限制畫面最多顯示 8 條，多餘的刪除，以免卡頓
      if (container.children.length > 8) {
        container.removeChild(container.lastChild);
      }

      // 動態增加主貼文的數據，營造人氣狂飆感
      dynamicReplies++;
      dynamicLikes += Math.floor(Math.random() * 3) + 1; // 按讚隨機跳動增加
      dynamicReposts += Math.random() > 0.7 ? 1 : 0; // 轉發偶爾增加

      updateCounters();
    }

    // --- 留言轟炸 💣 (瞬間噴出 5 條) ---
    function triggerHateBomb() {
      for (let i = 0; i < 5; i++) {
        setTimeout(() => {
          triggerSingleComment();
        }, i * 150);
      }
    }

    // --- 更新按讚/回覆計數器 UI ---
    function updateCounters() {
      const replEl = document.getElementById('repliesCount');
      const likeEl = document.getElementById('likesCount');
      const repEl = document.getElementById('repostsCount');

      if (replEl) replEl.textContent = dynamicReplies;
      if (likeEl) likeEl.textContent = dynamicLikes;
      if (repEl) repEl.textContent = dynamicReposts;
    }

    // --- 綠幕本機影片上傳播放處理 ---
    function handleChromaVideo(input) {
      const file = input.files[0];
      if (!file) return;

      const videoUrl = URL.createObjectURL(file);
      const videoEl = document.getElementById('chromaVideo');
      const statusEl = document.getElementById('videoStatus');
      const clearBtn = document.getElementById('clearVideoBtn');

      if (videoEl) {
        videoEl.src = videoUrl;
        videoEl.classList.remove('hidden');
        videoEl.play().catch(err => {
          console.log("Auto-play blocked, playing muted", err);
          videoEl.muted = true;
          videoEl.play();
        });
      }

      if (statusEl) {
        statusEl.textContent = `播放影片: ${file.name}`;
        statusEl.classList.remove('text-neutral-500', 'italic');
        statusEl.classList.add('text-green-400', 'not-italic', 'font-bold');
      }

      if (clearBtn) {
        clearBtn.classList.remove('hidden');
      }
    }

    // 清除影片，還原成純色背景
    function clearChromaVideo() {
      const videoEl = document.getElementById('chromaVideo');
      const statusEl = document.getElementById('videoStatus');
      const clearBtn = document.getElementById('clearVideoBtn');
      const inputEl = document.getElementById('chromaVideoInput');

      if (videoEl) {
        videoEl.pause();
        videoEl.src = "";
        videoEl.classList.add('hidden');
      }

      if (statusEl) {
        statusEl.textContent = "目前使用純色背景";
        statusEl.classList.remove('text-green-400', 'not-italic', 'font-bold');
        statusEl.classList.add('text-neutral-500', 'italic');
      }

      if (clearBtn) {
        clearBtn.classList.add('hidden');
      }

      if (inputEl) {
        inputEl.value = "";
      }
    }

    // --- 控制面板相關互動函數 ---

    // 1. 隱藏 / 顯示控制面板
    function toggleControlPanel() {
      const panel = document.getElementById('directorPanel');
      const floatBtn = document.getElementById('floatingControlBtn');
      if (panel.classList.contains('translate-x-full') || panel.classList.contains('opacity-0')) {
        panel.classList.remove('translate-x-full', 'opacity-0', 'pointer-events-none');
        panel.classList.add('scale-100', 'opacity-100');
        floatBtn.classList.add('hidden');
      } else {
        panel.classList.add('translate-x-full', 'opacity-0', 'pointer-events-none');
        panel.classList.remove('scale-100', 'opacity-100');
        floatBtn.classList.remove('hidden');
      }
    }

    // 2. 最小化控制面板內容 (只留標題列)
    function minimizePanel() {
      const content = document.getElementById('panelContent');
      const icon = document.getElementById('minIcon');
      if (isMinimized) {
        content.classList.remove('hidden');
        icon.className = "fa-solid fa-minus text-[14px]";
        isMinimized = false;
      } else {
        content.classList.add('hidden');
        icon.className = "fa-solid fa-plus text-[14px]";
        isMinimized = true;
      }
    }

    // 3. 調整去背純色
    function setChromaColor(hex) {
      currentChromaColor = hex;
      document.getElementById('chromaColorPicker').value = hex;
      document.getElementById('chromaHexText').textContent = hex.toUpperCase();
      
      const box = document.getElementById('chromaKeyBox');
      if (box) box.style.backgroundColor = hex;
    }

    function updateChromaFromPicker(hex) {
      currentChromaColor = hex;
      document.getElementById('chromaHexText').textContent = hex.toUpperCase();
      const box = document.getElementById('chromaKeyBox');
      if (box) box.style.backgroundColor = hex;
    }

    // 3.1 追蹤點 (Tracking Marks) 開關控制
    function toggleTrackingMarks() {
      showTrackingMarks = !showTrackingMarks;
      const toggleBtn = document.getElementById('trackingToggleBtn');
      const marksContainer = document.getElementById('trackingMarks');
      
      if (showTrackingMarks) {
        toggleBtn.textContent = "已開啟";
        toggleBtn.classList.replace('bg-neutral-800', 'bg-green-950');
        toggleBtn.classList.replace('text-neutral-300', 'text-green-400');
        toggleBtn.classList.replace('border-neutral-700', 'border-green-800');
        
        if (marksContainer) marksContainer.classList.remove('hidden');
      } else {
        toggleBtn.textContent = "已關閉";
        toggleBtn.classList.replace('bg-green-950', 'bg-neutral-800');
        toggleBtn.classList.replace('text-green-400', 'text-neutral-300');
        toggleBtn.classList.replace('border-green-800', 'border-neutral-700');
        
        if (marksContainer) marksContainer.classList.add('hidden');
      }
    }

    // 4. 調整 green-glow 貼文比例
    function setChromaAspect(aspectClass) {
      currentChromaAspect = aspectClass;
      const box = document.getElementById('chromaKeyBox');
      if (!box) return;

      // 移除所有舊比例 class
      box.classList.remove('aspect-square', 'aspect-[4/5]', 'aspect-video');
      box.classList.add(aspectClass);

      // 更新按鈕 active 狀態
      const buttons = document.querySelectorAll('.aspect-btn');
      buttons.forEach(btn => btn.classList.remove('bg-neutral-700', 'text-white', 'ring-1', 'ring-neutral-400'));
      
      event.currentTarget.classList.add('bg-neutral-700', 'text-white', 'ring-1', 'ring-neutral-400');
    }

    // 5. 暫停/播放自動留言
    function toggleAutoComments() {
      autoCommentsEnabled = !autoCommentsEnabled;
      const btnText = document.getElementById('playPauseText');
      const btnIcon = document.querySelector('#playPauseCommentBtn i');
      const statusLabel = document.getElementById('commentStatus');

      if (autoCommentsEnabled) {
        btnText.textContent = "暫停生成";
        btnIcon.className = "fa-solid fa-pause text-[13px]";
        statusLabel.textContent = "動態跳動中";
        statusLabel.className = "px-1.5 py-0.5 bg-green-950 text-green-400 rounded-full text-[10px] font-bold";
        startAutoComments();
      } else {
        btnText.textContent = "啟動生成";
        btnIcon.className = "fa-solid fa-play text-[13px]";
        statusLabel.textContent = "已暫停";
        statusLabel.className = "px-1.5 py-0.5 bg-neutral-800 text-neutral-400 rounded-full text-[10px] font-bold";
        if (commentsTimer) clearInterval(commentsTimer);
      }
    }

    // 6. 改變留言跳動速度
    function changeCommentSpeed(val) {
      commentSpeed = parseFloat(val);
      document.getElementById('speedVal').textContent = val + 's';
      if (autoCommentsEnabled) {
        startAutoComments(); // 重新設定計時器
      }
    }

    // 7. 手動修改、重設初始數值
    function resetCounts() {
      const savedLikes = document.getElementById('initLikes').value;
      dynamicLikes = parseInt(savedLikes) || 0;
      updateCounters();
    }

    // 8. 模擬按讚 (在手機畫面操作時可用)
    function simulateLike() {
      const icon = document.getElementById('obsessLikeIcon');
      if (icon.classList.contains('fa-regular')) {
        icon.className = 'fa-solid fa-heart text-[20px] text-red-500';
        dynamicLikes++;
      } else {
        icon.className = 'fa-regular fa-heart text-[20px] text-threadsLightGray';
        dynamicLikes--;
      }
      updateCounters();
    }

    // 模擬轉發
    function simulateRepost() {
      dynamicReposts++;
      updateCounters();
    }

    // 9. 滾動聚焦到 `obsess` 貼文
    function scrollToObsessPost() {
      const element = document.getElementById('obsessPostAnchor');
      if (element) {
        element.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    // 滾動到留言板
    function scrollToHaters() {
      const element = document.getElementById('hatersContainer');
      if (element) {
        element.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    // ==================== 🎥 專業拍攝模式核心控制 ====================
    function toggleFilmingMode() {
      if (isFilmingMode) {
        exitFilmingMode();
      } else {
        enterFilmingMode();
      }
    }

    function enterFilmingMode() {
      isFilmingMode = true;
      
      // 1. 隱藏瀏覽器捲軸、游標、控制面板
      document.body.classList.add('no-scrollbar', 'hide-cursor');
      document.getElementById('appHeader').classList.add('opacity-0', 'pointer-events-none', '-translate-y-full');
      document.getElementById('feedTabs').classList.add('opacity-0');
      document.getElementById('directorPanel').classList.add('opacity-0', 'pointer-events-none');
      
      // 2. 顯示大提示 Overlay
      const overlay = document.getElementById('filmingOverlay');
      overlay.classList.remove('opacity-0');
      setTimeout(() => {
        overlay.classList.add('opacity-0');
      }, 1800);

      // 3. 自動平滑定位到主角貼文
      setTimeout(() => {
        scrollToObsessPost();
      }, 300);

      // 4. 更新按鈕文字
      document.getElementById('filmingBtn').classList.replace('bg-red-600', 'bg-neutral-700');
      document.getElementById('filmingBtn').querySelector('span').textContent = "退出拍攝模式";
    }

    function exitFilmingMode() {
      isFilmingMode = false;
      
      // 1. 還原所有 UI 元素、捲軸與游標
      document.body.classList.remove('no-scrollbar', 'hide-cursor');
      document.getElementById('appHeader').classList.remove('opacity-0', 'pointer-events-none', '-translate-y-full');
      document.getElementById('feedTabs').classList.remove('opacity-0');
      
      // 2. 還原面板
      const panel = document.getElementById('directorPanel');
      panel.classList.remove('opacity-0', 'pointer-events-none');

      // 3. 還原按鈕文字
      document.getElementById('filmingBtn').classList.replace('bg-neutral-700', 'bg-red-600');
      document.getElementById('filmingBtn').querySelector('span').textContent = "進入拍攝模式";
    }
  </script>

</body>
