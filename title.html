<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼貼風格標題文字產生器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入多種風格的中英文字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;900&family=Noto+Serif+TC:wght@300;700;900&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&family=Liu+Jian+Mao+Cao&family=Long+Cang&family=Klee+One:wght@400;600&family=Courier+Prime:wght@400;700&family=Montserrat:wght@400;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        /* 隱藏的預載區域，確保 Canvas 繪製前字體已被瀏覽器解析 */
        #font-preload { position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0; overflow: hidden; }
        
        /* 透明棋盤格背景，用於預覽區 */
        .checker-bg {
            background-color: #121212;
            background-image: 
                linear-gradient(45deg, #1e1e1e 25%, transparent 25%, transparent 75%, #1e1e1e 75%, #1e1e1e),
                linear-gradient(45deg, #1e1e1e 25%, transparent 25%, transparent 75%, #1e1e1e 75%, #1e1e1e);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }

        /* 自訂滾動條 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000000; }
        ::-webkit-scrollbar-thumb { background: #333333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #555555; }
    </style>
</head>
<body class="bg-neutral-950 text-neutral-100 h-screen flex flex-col md:flex-row overflow-hidden font-sans">

    <!-- 用於強制載入字體 -->
    <div id="font-preload"></div>

    <!-- 左側黑白極簡控制台 -->
    <div class="w-full md:w-80 p-6 bg-black border-r border-neutral-800 flex flex-col gap-5 shadow-2xl z-10 overflow-y-auto shrink-0 font-mono">
        <div>
            <h1 class="text-xl font-black tracking-widest text-white flex items-center gap-2 uppercase">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-white"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" x2="8.12" y1="4" y2="15.88"/><line x1="14.47" x2="20" y1="14.48" y2="20"/><line x1="8.12" x2="12" y1="8.12" y2="12"/></svg>
                TILE TITLE
            </h1>
            <p class="text-[10px] text-neutral-500 mt-1 uppercase tracking-wider">拼貼風格標題文字產生器</p>
        </div>

        <!-- 拼貼模式 -->
        <div class="flex flex-col gap-1.5">
            <label class="text-xs font-bold text-neutral-400 uppercase tracking-wider">拼貼模式</label>
            <div class="flex bg-neutral-900 p-1 rounded border border-neutral-800">
                <button id="modeDecomp" class="flex-1 py-1.5 px-2 text-[11px] font-bold rounded bg-white text-black transition-all shadow-sm">部位重組模式</button>
                <button id="modeMask" class="flex-1 py-1.5 px-2 text-[11px] font-bold rounded text-neutral-400 hover:text-white hover:bg-neutral-800 transition-all">幾何遮罩模式</button>
            </div>
            <p id="modeDesc" class="text-[10px] text-neutral-500 leading-relaxed">將文字拆解為精細部件，進行非等比例拉伸。生成後點擊預覽畫面中的文字，可單獨切換該字的拼貼模式！</p>
        </div>

        <!-- 文字底色模式 -->
        <div class="flex flex-col gap-1.5">
            <label class="text-xs font-bold text-neutral-400 uppercase tracking-wider">文字底色模式</label>
            <div class="flex bg-neutral-900 p-1 rounded border border-neutral-800">
                <button id="colorModeBlack" class="flex-1 py-1.5 px-2 text-[11px] font-bold rounded bg-white text-black transition-all shadow-sm">墨黑字 (預設)</button>
                <button id="colorModeWhite" class="flex-1 py-1.5 px-2 text-[11px] font-bold rounded text-neutral-400 hover:text-white hover:bg-neutral-800 transition-all">極白字 (深底)</button>
            </div>
            <p id="colorModeDesc" class="text-[10px] text-neutral-500 leading-relaxed">墨黑字適合亮色底、白字模式專為深底/黑底 MV 特效設計，搭配高對比反轉背景紙張，極致防黑，清晰易讀。</p>
        </div>

        <!-- 文字輸入 -->
        <div class="flex flex-col gap-1.5">
            <label class="text-xs font-bold text-neutral-400 uppercase tracking-wider">輸入文字</label>
            <textarea id="textInput" class="w-full bg-neutral-900 border border-neutral-800 p-3 rounded text-sm focus:ring-1 focus:ring-white focus:border-white focus:outline-none resize-none transition-colors font-medium text-white placeholder-neutral-700" rows="3" placeholder="輸入文字 (支援中英文)...">WANTED 跪下</textarea>
        </div>

        <!-- 參數調節區 -->
        <div class="border-t border-neutral-800 pt-4 flex flex-col gap-4">
            <h3 class="text-[10px] font-black text-neutral-500 uppercase tracking-widest">風格與解析度設定</h3>
            
            <!-- 匯出解析度倍率 -->
            <div class="flex flex-col gap-1.5">
                <label class="text-xs text-neutral-300 font-bold">匯出影片解析度</label>
                <select id="exportScaleInput" class="w-full bg-neutral-900 border border-neutral-800 p-2 rounded text-xs text-white focus:ring-1 focus:ring-white focus:outline-none cursor-pointer">
                    <option value="1">標準畫質 (1x)</option>
                    <option value="1.5">HD 畫質 (1.5x)</option>
                    <option value="2">FHD 1080p (2x)</option>
                    <option value="3">2.5K (3x)</option>
                    <option value="4" selected>4K Ultra HD (4x)</option>
                </select>
                <p class="text-[10px] text-neutral-500 leading-relaxed">預覽時一律採用 1x 確保流暢，僅在「點擊匯出」時以高解析度無損渲染。</p>
            </div>

            <!-- 報紙模式開關 -->
            <div class="flex items-center justify-between border-b border-neutral-900 pb-3">
                <label class="text-xs text-neutral-300 font-bold">報紙黑白網點模式</label>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="newspaperModeToggle" class="sr-only peer">
                    <div class="w-11 h-6 bg-neutral-800 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:bg-black after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-neutral-400 after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-white"></div>
                </label>
            </div>

            <!-- 文字字距 (Tracking) -->
            <div class="flex flex-col gap-1">
                <div class="flex justify-between">
                    <label class="text-xs text-neutral-300">文字字距 (Tracking)</label>
                    <span id="trackingValue" class="text-xs text-neutral-100 font-mono">-10px</span>
                </div>
                <input type="range" id="trackingInput" min="-60" max="60" value="-10" class="w-full accent-white">
            </div>

            <!-- 部件內部間距 (Part Spacing) -->
            <div class="flex flex-col gap-1">
                <div class="flex justify-between">
                    <label class="text-xs text-neutral-300">部件內部間距 (Part Spacing)</label>
                    <span id="partGapValue" class="text-xs text-neutral-100 font-mono">5%</span>
                </div>
                <input type="range" id="partGapInput" min="-15" max="30" value="5" class="w-full accent-white">
            </div>

            <!-- 零件背景出現機率 -->
            <div class="flex flex-col gap-1">
                <div class="flex justify-between">
                    <label class="text-xs text-neutral-300">零件背景機率 (Bg Chance)</label>
                    <span id="bgChanceValue" class="text-xs text-neutral-100 font-mono">60%</span>
                </div>
                <input type="range" id="bgChanceInput" min="0" max="100" value="60" class="w-full accent-white">
            </div>

            <!-- 整體字元排版高低錯位 -->
            <div class="flex flex-col gap-1">
                <div class="flex justify-between">
                    <label class="text-xs text-neutral-300">整體文字高低錯位 (Offset)</label>
                    <span id="charOffsetValue" class="text-xs text-neutral-100 font-mono">12px</span>
                </div>
                <input type="range" id="charOffsetInput" min="0" max="40" value="12" class="w-full accent-white">
            </div>

            <!-- 部件旋轉錯位程度 -->
            <div class="flex flex-col gap-1">
                <div class="flex justify-between">
                    <label class="text-xs text-neutral-300">部件內部歪斜微調</label>
                    <span id="chaosValue" class="text-xs text-neutral-100 font-mono">15%</span>
                </div>
                <input type="range" id="chaosInput" min="0" max="40" value="15" class="w-full accent-white">
            </div>

            <!-- 背景邊距大小 -->
            <div class="flex flex-col gap-1">
                <div class="flex justify-between">
                    <label class="text-xs text-neutral-300">背景剪報尺寸 (邊距)</label>
                    <span id="bgPaddingValue" class="text-xs text-neutral-100 font-mono">1.15x</span>
                </div>
                <input type="range" id="bgPaddingInput" min="100" max="135" value="115" class="w-full accent-white">
            </div>

            <!-- FPS 變換頻率 -->
            <div class="flex flex-col gap-1">
                <div class="flex justify-between">
                    <label class="text-xs text-neutral-300">變換頻率 (FPS)</label>
                    <span id="fpsValue" class="text-xs text-neutral-100 font-mono">8</span>
                </div>
                <input type="range" id="fpsInput" min="4" max="15" value="8" class="w-full accent-white">
            </div>

            <!-- 影片長度 -->
            <div class="flex flex-col gap-1">
                <div class="flex justify-between">
                    <label class="text-xs text-neutral-300">影片長度 (秒)</label>
                    <span id="durationValue" class="text-xs text-neutral-100 font-mono">3</span>
                </div>
                <input type="range" id="durationInput" min="1" max="10" value="3" class="w-full accent-white">
            </div>
        </div>

        <!-- 狀態與進度區 -->
        <div id="statusArea" class="hidden flex-col gap-2">
            <div class="flex justify-between text-[11px] font-bold text-neutral-400">
                <span id="statusText">處理中...</span>
                <span id="progressText">0%</span>
            </div>
            <div class="w-full bg-neutral-900 h-1.5 rounded overflow-hidden border border-neutral-800">
                <div id="progressBar" class="bg-white h-full w-0 transition-all duration-200"></div>
            </div>
        </div>

        <div class="mt-auto flex flex-col gap-3 pt-4 border-t border-neutral-800">
            <button id="generateBtn" disabled class="w-full bg-neutral-900 text-neutral-500 py-3 rounded font-bold transition-all flex items-center justify-center gap-2 cursor-not-allowed">
                <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" id="loadingIcon">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                載入素材與字體中...
            </button>
            
            <!-- 匯出按鈕區 -->
            <div id="exportActionGroup" class="hidden flex-col gap-2">
                <button id="exportBtn" class="w-full bg-white hover:bg-neutral-200 text-black py-3 rounded font-bold transition-all shadow-lg flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                    匯出透明 WebM 影片
                </button>
            </div>
        </div>
    </div>

    <!-- 右側預覽區 -->
    <div class="flex-1 relative flex flex-col items-center justify-center checker-bg p-4 md:p-8">
        <div class="absolute top-4 right-4 bg-black/80 px-3 py-1.5 rounded text-[11px] text-neutral-400 border border-neutral-800 backdrop-blur-sm pointer-events-none uppercase tracking-wider z-10">
            Live Preview (Click char to toggle mode)
        </div>
        <!-- 使用一個容器來限制 canvas 最大尺寸並保持比例 -->
        <div class="max-w-full max-h-full flex items-center justify-center overflow-hidden rounded shadow-2xl ring-1 ring-white/5 bg-transparent relative z-10">
            <!-- 加入 cursor-pointer 讓滑鼠移上去變手指 -->
            <canvas id="previewCanvas" class="max-w-full max-h-[80vh] object-contain cursor-pointer"></canvas>
        </div>

        <!-- 右下角浮水印 LOGO -->
        <div class="absolute bottom-6 right-6 opacity-35 pointer-events-none flex flex-col items-center z-0">
            <svg id="Layer_2" data-name="Layer 2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680.37 542.12" class="w-[144px] h-auto">
              <defs>
                <style>
                  .cls-1 {
                    fill: #f2f2f2;
                    stroke-width: 0px;
                  }
                </style>
              </defs>
              <g id="Layer_1-2" data-name="Layer 1">
                <g>
                  <polygon class="cls-1" points="325.88 542.12 0 542.12 0 42.24 504.6 42.24 504.6 308.77 502.6 308.77 502.6 44.24 2 44.24 2 540.12 325.88 540.12 325.88 542.12"/>
                  <g>
                    <polygon class="cls-1" points="89.04 141.76 89.04 453.27 .18 453.27 .18 94.25 89.04 141.76"/>
                    <path class="cls-1" d="m320.89,352.5c-63.59,11.8-131.38-11.64-173.51-66.44-59.82-77.82-45.23-189.41,32.6-249.23,25.04-19.25,53.57-30.79,82.75-35.01,28.12-4.06,56.84-1.31,83.61,7.91,31.65,10.9,60.57,30.85,82.56,59.29l-70.47,54.17c-19.91-25.62-51.1-37.38-81.16-33.64-15.21,1.88-30.12,7.71-43.14,17.73-38.92,29.92-46.21,85.71-16.3,124.62,21.45,27.9,56.2,39.55,88.5,32.87l14.55,87.73Z"/>
                    <path class="cls-1" d="m680.37,219.98c0,32.85-8.91,63.62-24.45,90.02h-.01l-10.19,15.44-51.77,78.4-19.85,30.07c-44.61,67.56-120.17,108.21-201.13,108.21h-48.05v-88.87h63.22c41.8,0,80.8-20.98,103.83-55.86h0c-78.66-4.66-143.54-60.47-161.87-134.63-3.38-13.7-5.18-28.03-5.18-42.78,0-27.78,6.37-54.07,17.73-77.49l78.52,41.98c-5.04,11.51-7.69,24.29-7.36,37.71,1.16,47.96,40.89,86.67,88.87,86.66,30.53,0,57.47-15.42,73.46-38.87.44-.64.88-1.29,1.29-1.95h.01c8.91-13.85,14.09-30.34,14.09-48.04,0-49.09-39.79-88.87-88.87-88.87V42.24c98.16,0,177.73,79.58,177.73,177.74Z"/>
                  </g>
                </g>
              </g>
            </svg>
            <span class="text-[#f2f2f2] font-sans font-semibold text-[12px] tracking-[0.42em] pl-[0.32em] mt-2 whitespace-nowrap">Produce by Icy</span>
        </div>
    </div>

    <script>
        const fonts = [
            { family: 'Noto Sans TC', weights: [300, 500, 900] },
            { family: 'Noto Serif TC', weights: [300, 700, 900] },
            { family: 'Zhi Mang Xing', weights: [400] },
            { family: 'Ma Shan Zheng', weights: [400] },
            { family: 'Liu Jian Mao Cao', weights: [400] },
            { family: 'Long Cang', weights: [400] },
            { family: 'Klee One', weights: [400, 600] },
            { family: 'Courier Prime', weights: [400, 700] },
            { family: 'Montserrat', weights: [400, 900] },
            { family: 'Playfair Display', weights: [700] }
        ];

        // 漢字偏旁與部首本地精確對照表，確保拆解準確
        const localDecomp = {
            '跪': '⿰⿱口止危', '下': '⿱一卜', '求': '⿻氺丶', '饒': '⿰飠堯',
            '你': '⿰亻尔', '我': '⿻𠂉找', '他': '⿰亻也', '們': '⿰亻門',
            '好': '⿰女子', '給': '⿰糹合', '錢': '⿰金戔', '死': '⿱歹匕',
            '勒': '⿰革力', '索': '⿱十冖糸', '信': '⿰亻言', '警': '⿱敬言',
            '報': '⿰幸𠂤', '告': '⿱⺧口', '處': '⿸虍処', '理': '⿰王里',
            '辦': '⿲辛力辛', '法': '⿰氵去', '家': '⿱宀豕', '世': '⿻廿凵',
            '人': '人', '口': '口', '手': '手', '天': '⿱一大',
            '地': '⿰土也', '風': '⿵几𠂡', '格': '木', '標': '木', '題': '⿰是頁',
            '產': '文', '器': '⿱吅⿰⿱十口吅', '照': '⿱⿰日昭灬', '個': '⿰亻固',
            '面': '面'
        };

        const glyphOverrides = {
            '𧾷': '足', '飠': '飠', '糹': '糹', '亻': '亻', '彳': '彳',
            '氵': '氵', '灬': '灬', '犭': '犭', '⻏': '阝', '⻖': '阝',
            '宀': '宀', '辶': '辶', '𦾏': '若', '𡗗': '春'
        };

        let loadedBgImages = [];
        let precomputedFrames = []; 
        let previewInterval = null;
        let isGenerating = false;
        let currentMode = 'decomp'; 
        let textColorMode = 'black';
        let decompData = null; 
        let charOverrides = {}; // 特殊指定單字模式 (charIndex -> 'decomp' | 'mask')
        let charBoxes = [];     // 記錄每個文字在 Canvas 上的物理邊界供點擊檢測

        const ui = {
            modeDecomp: document.getElementById('modeDecomp'),
            modeMask: document.getElementById('modeMask'),
            modeDesc: document.getElementById('modeDesc'),
            colorModeBlack: document.getElementById('colorModeBlack'),
            colorModeWhite: document.getElementById('colorModeWhite'),
            colorModeDesc: document.getElementById('colorModeDesc'),
            textInput: document.getElementById('textInput'),
            fpsInput: document.getElementById('fpsInput'),
            fpsValue: document.getElementById('fpsValue'),
            durationInput: document.getElementById('durationInput'),
            durationValue: document.getElementById('durationValue'),
            chaosInput: document.getElementById('chaosInput'),
            chaosValue: document.getElementById('chaosValue'),
            bgPaddingInput: document.getElementById('bgPaddingInput'),
            bgPaddingValue: document.getElementById('bgPaddingValue'),
            charOffsetInput: document.getElementById('charOffsetInput'),
            charOffsetValue: document.getElementById('charOffsetValue'),
            trackingInput: document.getElementById('trackingInput'),
            trackingValue: document.getElementById('trackingValue'),
            partGapInput: document.getElementById('partGapInput'),
            partGapValue: document.getElementById('partGapValue'),
            bgChanceInput: document.getElementById('bgChanceInput'),
            bgChanceValue: document.getElementById('bgChanceValue'),
            newspaperModeToggle: document.getElementById('newspaperModeToggle'),
            exportScaleInput: document.getElementById('exportScaleInput'),
            generateBtn: document.getElementById('generateBtn'),
            exportActionGroup: document.getElementById('exportActionGroup'),
            exportBtn: document.getElementById('exportBtn'),
            statusArea: document.getElementById('statusArea'),
            progressBar: document.getElementById('progressBar'),
            progressText: document.getElementById('progressText'),
            statusText: document.getElementById('statusText'),
            previewCanvas: document.getElementById('previewCanvas'),
            loadingIcon: document.getElementById('loadingIcon')
        };

        ui.fpsInput.addEventListener('input', e => ui.fpsValue.innerText = e.target.value);
        ui.durationInput.addEventListener('input', e => ui.durationValue.innerText = e.target.value);
        ui.chaosInput.addEventListener('input', e => ui.chaosValue.innerText = e.target.value + '%');
        ui.bgPaddingInput.addEventListener('input', e => ui.bgPaddingValue.innerText = (e.target.value / 100).toFixed(2) + 'x');
        ui.charOffsetInput.addEventListener('input', e => ui.charOffsetValue.innerText = e.target.value + 'px');
        ui.trackingInput.addEventListener('input', e => ui.trackingValue.innerText = e.target.value + 'px');
        ui.partGapInput.addEventListener('input', e => ui.partGapValue.innerText = e.target.value + '%');
        ui.bgChanceInput.addEventListener('input', e => ui.bgChanceValue.innerText = e.target.value + '%');
        
        ui.generateBtn.addEventListener('click', generateAnimation);
        ui.exportBtn.addEventListener('click', exportVideo);

        ui.modeDecomp.addEventListener('click', () => setMode('decomp'));
        ui.modeMask.addEventListener('click', () => setMode('mask'));
        ui.colorModeBlack.addEventListener('click', () => setTextColorMode('black'));
        ui.colorModeWhite.addEventListener('click', () => setTextColorMode('white'));

        function setMode(mode) {
            currentMode = mode;
            charOverrides = {}; // 切換全域模式時重置個體覆寫
            if (mode === 'decomp') {
                ui.modeDecomp.className = "flex-1 py-1.5 px-2 text-[11px] font-bold rounded bg-white text-black transition-all shadow-sm";
                ui.modeMask.className = "flex-1 py-1.5 px-2 text-[11px] font-bold rounded text-neutral-400 hover:text-white hover:bg-neutral-800 transition-all";
                ui.modeDesc.innerText = '將文字拆解為精細部件，進行非等比例拉伸。生成後點擊預覽畫面中的文字，可單獨切換該字的拼貼模式！';
            } else {
                ui.modeMask.className = "flex-1 py-1.5 px-2 text-[11px] font-bold rounded bg-white text-black transition-all shadow-sm";
                ui.modeDecomp.className = "flex-1 py-1.5 px-2 text-[11px] font-bold rounded text-neutral-400 hover:text-white hover:bg-neutral-800 transition-all";

        function parseIDS(str) {
            if (!str) return null;
            let index = 0;
            const chars = Array.from(str);

            function parseNode() {
                if (index >= chars.length) return null;
                const char = chars[index++];
                if (char >= '\u2FF0' && char <= '\u2FFB') {
                    const op = char;
                    if (op === '⿲' || op === '⿳') {
                        const c1 = parseNode(); const c2 = parseNode(); const c3 = parseNode();
                        return { op, children: [c1, c2, c3] };
                    } else {
                        const c1 = parseNode(); const c2 = parseNode();
                        return { op, children: [c1, c2] };
                    }
                } else {
                    return { op: 'leaf', char };
                }
            }
            return parseNode();
        }

        function getASTForChar(char, depth = 0, maxDepth = 2) {
            let decompStr = localDecomp[char];
            if (!decompStr && decompData && decompData[char]) decompStr = decompData[char];
            if (!decompStr || depth >= maxDepth) return { op: 'leaf', char };
            
            const ast = parseIDS(decompStr);
            if (!ast) return { op: 'leaf', char };

            function resolveTree(node, currentDepth) {
                if (!node) return null;
                if (node.op === 'leaf') {
                    if (currentDepth < maxDepth && (localDecomp[node.char] || (decompData && decompData[node.char]))) {
                        return getASTForChar(node.char, currentDepth + 1, maxDepth);
                    }
                    return node;
                }
                if (node.children) {
                    node.children = node.children.map(child => resolveTree(child, currentDepth + 1));
                }
                return node;
            }
            return resolveTree(ast, depth);
        }

        function needsMaskFallback(node) {
            if (!node) return false;
            if (node.op === 'leaf') {
                const code = node.char.charCodeAt(0);
                const isStandardCJK = code >= 0x4E00 && code <= 0x9FFF;
                const inOverride = glyphOverrides[node.char] !== undefined;
                const isAlphanumeric = /^[a-zA-Z0-9]$/.test(node.char);
                return (!isStandardCJK && !inOverride && !isAlphanumeric);
            }
            const supportedOps = ['⿰', '⿱', '⿲', '⿳'];
            if (!supportedOps.includes(node.op)) return true;
            if (node.children) {
                for (let child of node.children) {
                    if (needsMaskFallback(child)) return true;
                }
            }
            return false;
        }

        function layoutAST(node, x, y, w, h, gapRatio, results = []) {
            if (!node) return results;
            if (node.op === 'leaf') {
                results.push({ char: glyphOverrides[node.char] || node.char, x, y, w, h });
                return results;
            }
            const children = node.children;
            if (!children || children.length === 0) return results;

            if (node.op === '⿰') {
                const subW = w * (1 - gapRatio) / 2;
                layoutAST(children[0], x - subW/2 - (w * gapRatio)/2, y, subW, h, gapRatio, results);
                layoutAST(children[1], x + subW/2 + (w * gapRatio)/2, y, subW, h, gapRatio, results);
            } 
            else if (node.op === '⿱') {
                const subH = h * (1 - gapRatio) / 2;
                layoutAST(children[0], x, y - subH/2 - (h * gapRatio)/2, w, subH, gapRatio, results);
                layoutAST(children[1], x, y + subH/2 + (h * gapRatio)/2, w, subH, gapRatio, results);
            } 
            else if (node.op === '⿲') {
                const subW = w * (1 - gapRatio * 2) / 3;
                layoutAST(children[0], x - subW - w * gapRatio, y, subW, h, gapRatio, results);
                layoutAST(children[1], x, y, subW, h, gapRatio, results);
                layoutAST(children[2], x + subW + w * gapRatio, y, subW, h, gapRatio, results);
            } 
            else if (node.op === '⿳') {
                const subH = h * (1 - gapRatio * 2) / 3;
                layoutAST(children[0], x, y - subH - h * gapRatio, w, subH, gapRatio, results);
                layoutAST(children[1], x, y, w, subH, gapRatio, results);
                layoutAST(children[2], x, y + subH + h * gapRatio, w, subH, gapRatio, results);
            } 
            else {
                layoutAST(children[0], x, y, w, h, gapRatio, results);
                if (children[1]) {
                    layoutAST(children[1], x, y, w * 0.55, h * 0.55, gapRatio, results);
                }
            }
            return results;
        }

        function drawRansomCard(ctx, x, y, w, h, bgImg, paddingFactor, isNewspaperMode, scale, textColorMode) {
            ctx.save();
            ctx.translate(x, y); 
            
            const cardW = w * paddingFactor;
            const cardH = h * paddingFactor;
            const hw = cardW / 2;
            const hh = cardH / 2;

            ctx.shadowColor = textColorMode === 'white' ? 'rgba(0, 0, 0, 0.55)' : 'rgba(0, 0, 0, 0.4)';
            ctx.shadowBlur = 12 * scale;
            ctx.shadowOffsetX = 3 * scale;
            ctx.shadowOffsetY = 5 * scale;

            const edgeNoise = Math.min(cardW, cardH) * 0.12;
            const corners = [
                { x: -hw + (Math.random() - 0.5) * edgeNoise, y: -hh + (Math.random() - 0.5) * edgeNoise },
                { x: hw + (Math.random() - 0.5) * edgeNoise, y: -hh + (Math.random() - 0.5) * edgeNoise },
                { x: hw + (Math.random() - 0.5) * edgeNoise, y: hh + (Math.random() - 0.5) * edgeNoise },
                { x: -hw + (Math.random() - 0.5) * edgeNoise, y: hh + (Math.random() - 0.5) * edgeNoise }
            ];

            ctx.beginPath();
            ctx.moveTo(corners[0].x, corners[0].y);
            for (let i = 0; i < 4; i++) {
                const next = corners[(i + 1) % 4];
                const curr = corners[i];
                const cx = (curr.x + next.x) / 2 + (Math.random() - 0.5) * (cardW * 0.04);
                const cy = (curr.y + next.y) / 2 + (Math.random() - 0.5) * (cardH * 0.04);
                ctx.quadraticCurveTo(cx, cy, next.x, next.y);
            }
            ctx.closePath();

            if (textColorMode === 'white') {
                ctx.fillStyle = isNewspaperMode ? '#151515' : '#1c1c1e';
            } else {
                ctx.fillStyle = isNewspaperMode ? '#f0f0f0' : '#fbf9f5';
            }
            ctx.fill();
            ctx.clip();

            if (bgImg) {
                ctx.save();
                if (isNewspaperMode) {
                    if (textColorMode === 'white') {
                        ctx.filter = 'invert(100%) grayscale(100%) contrast(160%) brightness(50%)';
                    } else {
                        ctx.filter = 'grayscale(100%) contrast(160%) brightness(100%)';
                    }
                } else {
                    if (textColorMode === 'white') {
                        ctx.filter = 'invert(100%) brightness(60%) contrast(140%)';
                    }
                }

                const cropPercent = 0.08 + Math.random() * 0.08;
                const cropW = bgImg.width * cropPercent;
                const cropH = bgImg.height * cropPercent;
                const cropX = Math.random() * (bgImg.width - cropW);
                const cropY = Math.random() * (bgImg.height - cropH);

                ctx.rotate((Math.random() - 0.5) * Math.PI * 2);
                ctx.scale(1.3, 1.3);
                ctx.drawImage(bgImg, cropX, cropY, cropW, cropH, -hw, -hh, cardW, cardH);
                ctx.restore();
            } else {
                let defaultColors;
                if (textColorMode === 'white') {
                    defaultColors = isNewspaperMode ? ['#1e1e1e', '#222222', '#111111', '#2c2c2c'] : ['#9b2226', '#005f73', '#0a9396', '#ae2012', '#001219', '#1a3636'];
                } else {
                    defaultColors = isNewspaperMode ? ['#555555', '#aaaaaa', '#333333', '#dddddd'] : ['#e63946', '#f1faee', '#a8dadc', '#457b9d', '#1d3557', '#f4a261'];
                }
                ctx.fillStyle = defaultColors[Math.floor(Math.random() * defaultColors.length)];
                ctx.fillRect(-hw, -hh, cardW, cardH);
            }

            if (textColorMode === 'white') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; 
            } else {
                ctx.fillStyle = isNewspaperMode ? 'rgba(255, 252, 245, 0.08)' : 'rgba(254, 251, 243, 0.15)';
            }
            ctx.fillRect(-hw, -hh, cardW, cardH);

            if (isNewspaperMode) {
                ctx.fillStyle = textColorMode === 'white' ? 'rgba(255, 255, 255, 0.18)' : 'rgba(0, 0, 0, 0.13)';
                const dotSpacing = 5 * scale;
                for (let dx = -hw - 4 * scale; dx < hw + 4 * scale; dx += dotSpacing) {
                    for (let dy = -hh - 4 * scale; dy < hh + 4 * scale; dy += dotSpacing) {
                        ctx.beginPath();
                        const offset = (Math.floor(dy / dotSpacing) % 2 === 0) ? dotSpacing / 2 : 0;
                        ctx.arc(dx + offset, dy, 1.2 * scale, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            } else {
                ctx.strokeStyle = textColorMode === 'white' ? 'rgba(255, 255, 255, 0.1)' : 'rgba(0, 0, 0, 0.07)';
                ctx.lineWidth = 1 * scale;
                for (let j = -hh; j < hh; j += 4 * scale) {
                    ctx.beginPath();
                    ctx.moveTo(-hw, j);
                    ctx.lineTo(hw, j);
                    ctx.stroke();
                }
            }

            if (textColorMode === 'white') {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.18)';
                ctx.lineWidth = 1 * scale;
                ctx.stroke();
            } else {
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.08)';
                ctx.lineWidth = 0.5 * scale;
                ctx.stroke();
            }

            ctx.restore();
        }

        function createJaggedPath(path, x1, y1, x2, y2, segments = 5, variance = 10) {
            for (let i = 1; i <= segments; i++) {
                const t = i / segments;
                let nx = x1 + (x2 - x1) * t;
                let ny = y1 + (y2 - y1) * t;
                if (i < segments) {
                    const dx = x2 - x1;
                    const dy = y2 - y1;
                    const len = Math.sqrt(dx*dx + dy*dy) || 1;
                    const nx_norm = -dy / len;
                    const ny_norm = dx / len;
                    const offset = (Math.random() - 0.5) * variance;
                    nx += nx_norm * offset;
                    ny += ny_norm * offset;
                }
                path.lineTo(nx, ny);
            }
        }

        function generatePartMaskPath(partX, partY, partW, partH, scale) {
            const p = new Path2D();
            const pad = 12 * scale;
            const hw = partW / 2 + pad;
            const hh = partH / 2 + pad;
            
            const x1 = partX - hw;
            const y1 = partY - hh;
            const x2 = partX + hw;
            const y2 = partY + hh;

            p.moveTo(x1, y1);
            createJaggedPath(p, x1, y1, x2, y1, 4, 8 * scale);
            createJaggedPath(p, x2, y1, x2, y2, 4, 8 * scale);
            createJaggedPath(p, x2, y2, x1, y2, 4, 8 * scale);
            createJaggedPath(p, x1, y2, x1, y1, 4, 8 * scale);
            p.closePath();
            return p;
        }

        function generatePieces(width, height, numPieces) {
            const cx = width / 2 + (Math.random() - 0.5) * width * 0.1;
            const cy = height / 2 + (Math.random() - 0.5) * height * 0.1;
            const r = Math.sqrt(width * width + height * height);
            const pieces = [];
            let startAngle = Math.random() * Math.PI * 2;
            for (let i = 0; i < numPieces; i++) {
                let angleSweep = (Math.PI * 2) / numPieces + (Math.random() - 0.5) * 0.5;
                if (i === numPieces - 1) angleSweep = Math.PI * 2 - (pieces.length * ((Math.PI * 2) / numPieces));
                const endAngle = startAngle + angleSweep;
                const x1 = cx + Math.cos(startAngle) * r;
                const y1 = cy + Math.sin(startAngle) * r;
                const x2 = cx + Math.cos(endAngle) * r;
                const y2 = cy + Math.sin(endAngle) * r;

                const p = new Path2D();
                p.moveTo(cx, cy);
                createJaggedPath(p, cx, cy, x1, y1, 4, 15);
                p.lineTo(x2, y2);
                createJaggedPath(p, x2, y2, cx, cy, 4, 15);
                p.closePath();
                pieces.push(p);
                startAngle = endAngle;
            }
            return pieces;
        }

        function renderFrameToContext(ctx, f, rawText, settings, scale) {
            const { currentMode, textColorMode, tracking, partGapRatio, bgProbability, isNewspaperMode, charOffsetLevel, chaosLevel, paddingFactor } = settings;

            const lines = rawText.split('\n');
            let maxCols = 0;
            lines.forEach(l => maxCols = Math.max(maxCols, Array.from(l).length));
            if (maxCols === 0) maxCols = 1;

            const charSize = 260 * scale;
            const padding = 60 * scale;
            const spacing = charSize + tracking * scale;

            const canvasWidth = maxCols * spacing - tracking * scale + padding * 2;

            ctx.textBaseline = 'middle';
            ctx.textAlign = 'center';

            if (f === 0) charBoxes = []; // 首影格記錄物理點擊框

            let globalCharIndex = 0;

            for (let row = 0; row < lines.length; row++) {
                const chars = Array.from(lines[row]);
                const rowWidth = chars.length * spacing - tracking * scale;
                const startX = (canvasWidth - rowWidth) / 2 + (charSize / 2);
                
                for (let col = 0; col < chars.length; col++) {
                    const char = chars[col];
                    if (char.trim() === '') {
                        globalCharIndex++;
                        continue;
                    }

                    const charIndex = globalCharIndex++;
                    // 優先採用個體覆寫模式，無指定則採用全域預設模式
                    const activeCharMode = charOverrides[charIndex] || currentMode;

                    const charOffsetX = (Math.random() - 0.5) * charOffsetLevel * 1.5 * scale;
                    const charOffsetY = (Math.random() - 0.5) * charOffsetLevel * 1.5 * scale;
                    const charAngleOffset = (Math.random() - 0.5) * (charOffsetLevel / 40) * 0.12;

                    const charX = startX + col * spacing + charOffsetX;
                    const charY = padding + row * charSize + charSize / 2 + charOffsetY;

                    if (f === 0) {
                        charBoxes.push({
                            index: charIndex,
                            x: charX,
                            y: charY,
                            size: charSize,
                            mode: activeCharMode
                        });
                    }

                    let useMaskForThisChar = (activeCharMode === 'mask');
                    let ast = getASTForChar(char);
                    let parts = layoutAST(ast, 0, 0, charSize * 0.85, charSize * 0.85, partGapRatio);

                    if (!useMaskForThisChar && needsMaskFallback(ast)) {
                        useMaskForThisChar = true;
                    }

                    if (useMaskForThisChar) {
                        // 智能幾何遮罩：若字能拆出零件（如「照」拆為日、刀、口、灬），則依零件輪廓切割，否則隨機切割
                        let pieceMasks = [];
                        if (parts && parts.length > 1) {
                            parts.forEach(part => {
                                pieceMasks.push({
                                    path: generatePartMaskPath(part.x, part.y, part.w, part.h, scale),
                                    w: part.w,
                                    h: part.h,
                                    x: part.x,
                                    y: part.y
                                });
                            });
                        } else {
                            const numPieces = Math.floor(Math.random() * 3) + 2;
                            const pieces = generatePieces(charSize, charSize, numPieces);
                            pieces.forEach(p => pieceMasks.push({ path: p, w: charSize * 0.7, h: charSize * 0.7, x: 0, y: 0 }));
                        }

                        let bgIndices = [];
                        pieceMasks.forEach((_, idx) => { if (Math.random() < bgProbability) bgIndices.push(idx); });
                        if (bgProbability > 0 && bgIndices.length === 0) bgIndices.push(Math.floor(Math.random() * pieceMasks.length));

                        pieceMasks.forEach((pieceObj, idx) => {
                            ctx.save();
                            ctx.translate(charX, charY);
                            ctx.rotate(charAngleOffset);

                            ctx.rotate((Math.random() - 0.5) * 0.1 * chaosLevel);
                            ctx.translate((Math.random() - 0.5) * 20 * chaosLevel * scale, (Math.random() - 0.5) * 20 * chaosLevel * scale);

                            const hasBg = bgIndices.includes(idx);
                            if (hasBg && loadedBgImages.length > 0) {
                                const bgImg = loadedBgImages[Math.floor(Math.random() * loadedBgImages.length)];
                                drawRansomCard(ctx, pieceObj.x, pieceObj.y, pieceObj.w, pieceObj.h, bgImg, paddingFactor, isNewspaperMode, scale, textColorMode);
                            }

                            ctx.save();
                            ctx.clip(pieceObj.path);

                            const fontObj = fonts[Math.floor(Math.random() * fonts.length)];
                            ctx.font = `900 ${charSize * 0.8}px '${fontObj.family}'`;
                            ctx.fillStyle = textColorMode === 'white' ? '#fbfbfb' : '#0a0a0a'; 
                            ctx.fillText(char, 0, 0);
                            ctx.restore();

                            if (hasBg) {
                                ctx.lineWidth = 1.5 * scale;
                                ctx.strokeStyle = textColorMode === 'white' ? 'rgba(255,255,255,0.25)' : 'rgba(0,0,0,0.15)';
                                ctx.stroke(pieceObj.path);
                            }
                            ctx.restore();
                        });

                    } else {
                        // 部件重組模式
                        const numParts = parts.length;
                        let bgIndices = [];
                        parts.forEach((_, idx) => { if (Math.random() < bgProbability) bgIndices.push(idx); });
                        if (bgProbability > 0 && bgIndices.length === 0) bgIndices.push(Math.floor(Math.random() * numParts));

                        ctx.save();
                        ctx.translate(charX, charY);
                        ctx.rotate(charAngleOffset);

                        parts.forEach((part, idx) => {
                            ctx.save();
                            
                            const partX = part.x + (Math.random() - 0.5) * 20 * chaosLevel * scale;
                            const partY = part.y + (Math.random() - 0.5) * 20 * chaosLevel * scale;
                            const partAngle = (Math.random() - 0.5) * 0.35 * chaosLevel;

                            ctx.translate(partX, partY);
                            ctx.rotate(partAngle);

                            const hasBg = bgIndices.includes(idx);
                            const fontObj = fonts[Math.floor(Math.random() * fonts.length)];
                            const weight = (fontObj.family.includes('Noto') || fontObj.family === 'Montserrat') ? '900' : 'normal';
                            
                            const baseSize = 100 * scale;
                            ctx.font = `${weight} ${baseSize}px '${fontObj.family}'`;
                            
                            const metrics = ctx.measureText(part.char);
                            const textW = metrics.width || (baseSize * 0.85);
                            const textH = baseSize * 0.85;

                            const isAlpha = /^[a-zA-Z0-9]$/.test(part.char);
                            let displayW = part.w;
                            let displayH = part.h;
                            if (isAlpha && numParts === 1) {
                                displayW = part.w * 0.65;
                            }

                            const scaleX = displayW / textW;
                            const scaleY = displayH / textH;

                            if (hasBg && loadedBgImages.length > 0) {
                                const bgImg = loadedBgImages[Math.floor(Math.random() * loadedBgImages.length)];
                                drawRansomCard(ctx, 0, 0, displayW, displayH, bgImg, paddingFactor, isNewspaperMode, scale, textColorMode);
                            }

                            ctx.fillStyle = textColorMode === 'white' ? '#fbfbfb' : '#0a0a0a'; 
                            ctx.save();
                            ctx.scale(scaleX, scaleY);
                            ctx.scale(1 + (Math.random() - 0.5) * 0.04, 1 + (Math.random() - 0.5) * 0.04);
                            ctx.fillText(part.char, 0, 0);
                            ctx.restore();

                            ctx.restore();
                        });
                        ctx.restore();
                    }
                }
            }
        }

        async function generateAnimation() {
            if (isGenerating) return;
            isGenerating = true;
            
            clearInterval(previewInterval);
            ui.exportActionGroup.classList.add('hidden');
            ui.generateBtn.disabled = true;
            ui.generateBtn.className = "w-full bg-neutral-900 text-neutral-500 py-3 rounded font-bold transition-all flex items-center justify-center gap-2 cursor-wait";
            ui.generateBtn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                準備排版中...
            `;
            
            ui.statusArea.classList.remove('hidden');
            ui.statusArea.classList.add('flex');
            ui.statusText.innerText = '正在精心排版中...';
            ui.progressBar.className = "bg-white h-full w-0 transition-all duration-200"; 
            ui.progressBar.style.width = '0%';
            ui.progressText.innerText = '0%';

            await new Promise(r => setTimeout(r, 50));

            const rawText = ui.textInput.value || '請輸入文字';
            const fps = parseInt(ui.fpsInput.value);
            const duration = parseInt(ui.durationInput.value);
            const totalFrames = fps * duration;

            const settings = {
                currentMode, textColorMode, 
                tracking: parseInt(ui.trackingInput.value),
                partGapRatio: parseInt(ui.partGapInput.value) / 100,
                bgProbability: parseInt(ui.bgChanceInput.value) / 100,
                isNewspaperMode: ui.newspaperModeToggle.checked,
                charOffsetLevel: parseInt(ui.charOffsetInput.value),
                chaosLevel: parseInt(ui.chaosInput.value) / 100,
                paddingFactor: parseInt(ui.bgPaddingInput.value) / 100
            };

            const lines = rawText.split('\n');
            let maxCols = 0;
            lines.forEach(l => maxCols = Math.max(maxCols, Array.from(l).length));
            if (maxCols === 0) maxCols = 1;

            const charSize = 260; 
            const padding = 60;
            const spacing = charSize + settings.tracking;
            const canvasWidth = maxCols * spacing - settings.tracking + padding * 2;
            const canvasHeight = lines.length * charSize + padding * 2;

            const renderCanvas = document.createElement('canvas');
            renderCanvas.width = canvasWidth;
            renderCanvas.height = canvasHeight;
            const ctx = renderCanvas.getContext('2d');

            precomputedFrames = [];

            for (let f = 0; f < totalFrames; f++) {
                ctx.clearRect(0, 0, renderCanvas.width, renderCanvas.height);
                renderFrameToContext(ctx, f, rawText, settings, 1.0);
                precomputedFrames.push(ctx.getImageData(0, 0, renderCanvas.width, renderCanvas.height));

                const percent = Math.round(((f + 1) / totalFrames) * 100);
                ui.progressBar.style.width = `${percent}%`;
                ui.progressText.innerText = `${percent}%`;
                if (f % 4 === 0) await new Promise(r => setTimeout(r, 0));
            }

            ui.statusArea.classList.remove('flex');
            ui.statusArea.classList.add('hidden');
            ui.generateBtn.disabled = false;
            ui.generateBtn.className = "w-full bg-white hover:bg-neutral-200 text-black py-3 rounded font-bold transition-all shadow-lg flex items-center justify-center gap-2";
            ui.generateBtn.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                重新產生
            `;
            ui.exportActionGroup.classList.remove('hidden');
            ui.exportActionGroup.classList.add('flex');
            isGenerating = false;
            startPreviewLoop(fps);
        }

        function startPreviewLoop(fps) {
            const canvas = ui.previewCanvas;
            const ctx = canvas.getContext('2d');
            if (precomputedFrames.length === 0) return;
            canvas.width = precomputedFrames[0].width;
            canvas.height = precomputedFrames[0].height;
            let currentFrameIndex = 0;
            previewInterval = setInterval(() => {
                ctx.putImageData(precomputedFrames[currentFrameIndex], 0, 0);
                currentFrameIndex = (currentFrameIndex + 1) % precomputedFrames.length;
            }, 1000 / fps);
        }

        // 點擊 Canvas 上特定文字，獨立切換該字的拼貼模式 (Decomposition <-> Mask)
        ui.previewCanvas.addEventListener('click', e => {
            if (charBoxes.length === 0 || isGenerating) return;
            const rect = ui.previewCanvas.getBoundingClientRect();
            const scaleX = ui.previewCanvas.width / rect.width;
            const scaleY = ui.previewCanvas.height / rect.height;
            const clickX = (e.clientX - rect.left) * scaleX;
            const clickY = (e.clientY - rect.top) * scaleY;

            for (const box of charBoxes) {
                if (clickX >= box.x - box.size/2 && clickX <= box.x + box.size/2 &&
                    clickY >= box.y - box.size/2 && clickY <= box.y + box.size/2) {
                    
                    const nextMode = (box.mode === 'mask') ? 'decomp' : 'mask';
                    charOverrides[box.index] = nextMode;
                    generateAnimation(); // 觸發重繪
                    break;
                }
            }
        });

        async function exportVideo() {
            if (precomputedFrames.length === 0) return;
            
            const webmBtn = ui.exportBtn;
            const originalContent = webmBtn.innerHTML;
            
            webmBtn.disabled = true;
            webmBtn.className = "w-full bg-neutral-900 text-neutral-500 py-3 rounded text-xs font-bold transition-all flex items-center justify-center gap-2 cursor-wait";
            webmBtn.innerHTML = `<svg class="animate-spin mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> WebM 高畫質編碼中...`;

            const rawText = ui.textInput.value || '請輸入文字';
            const fps = parseInt(ui.fpsInput.value);
            const duration = parseInt(ui.durationInput.value);
            const totalFrames = fps * duration;
            const exportScale = parseFloat(ui.exportScaleInput.value);

            const settings = {
                currentMode, textColorMode, 
                tracking: parseInt(ui.trackingInput.value),
                partGapRatio: parseInt(ui.partGapInput.value) / 100,
                bgProbability: parseInt(ui.bgChanceInput.value) / 100,
                isNewspaperMode: ui.newspaperModeToggle.checked,
                charOffsetLevel: parseInt(ui.charOffsetInput.value),
                chaosLevel: parseInt(ui.chaosInput.value) / 100,
                paddingFactor: parseInt(ui.bgPaddingInput.value) / 100
            };

            const lines = rawText.split('\n');
            let maxCols = 0;
            lines.forEach(l => maxCols = Math.max(maxCols, Array.from(l).length));
            if (maxCols === 0) maxCols = 1;

            const charSize = 260; 
            const padding = 60;
            const spacing = charSize + settings.tracking;
            const baseWidth = maxCols * spacing - settings.tracking + padding * 2;
            const baseHeight = lines.length * charSize + padding * 2;

            const recordCanvas = document.createElement('canvas');
            recordCanvas.width = baseWidth * exportScale;
            recordCanvas.height = baseHeight * exportScale;
            const ctx = recordCanvas.getContext('2d');

            let mimeType = 'video/webm; codecs=vp9';
            if (!MediaRecorder.isTypeSupported(mimeType)) {
                mimeType = 'video/webm; codecs=vp8';
                console.warn('瀏覽器不支援 VP9 透明編碼，自動降級為 VP8。');
            }

            const stream = recordCanvas.captureStream(fps);
            const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 80000000 }); 
            const chunks = [];

            recorder.ondataavailable = e => {
                if (e.data.size > 0) chunks.push(e.data);
            };

            const recordingFinished = new Promise(resolve => {
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: mimeType });
                    resolve(blob);
                };
            });

            recorder.start();

            ui.statusArea.classList.remove('hidden');
            ui.statusArea.classList.add('flex');
            ui.statusText.innerText = '正在生成高畫質無損 WebM 影格...';
            ui.progressBar.className = "bg-white h-full w-0 transition-all duration-200";

            for (let i = 0; i < totalFrames; i++) {
                ctx.clearRect(0, 0, recordCanvas.width, recordCanvas.height);
                renderFrameToContext(ctx, i, rawText, settings, exportScale);

                const percent = Math.round(((i + 1) / totalFrames) * 100);
                ui.progressBar.style.width = `${percent}%`;
                ui.progressText.innerText = `${percent}%`;

                await new Promise(r => setTimeout(r, 1000 / fps));
            }

            recorder.stop();
            const blob = await recordingFinished;

            ui.statusArea.classList.add('hidden');

            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = getCustomFileName('webm'); // 使用輸入文字自動命名
            document.body.appendChild(a);
            a.click();
            
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                webmBtn.disabled = false;
                webmBtn.className = "w-full bg-white hover:bg-neutral-200 text-black py-3 rounded font-bold transition-all shadow-lg flex items-center justify-center gap-2";
                webmBtn.innerHTML = originalContent;
            }, 500);
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
